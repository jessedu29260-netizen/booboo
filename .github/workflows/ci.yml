name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: create-booboo smoke (scaffold → build → assert)
        run: |
          node packages/create-booboo/dist/cli.js /tmp/smoke --force
          node packages/cli/dist/cli.js build --config /tmp/smoke/booboo.config.yaml
          test -f /tmp/smoke/brain.json
          node -e "const g=require('/tmp/smoke/brain.json'); if(!g.nodes?.length) throw new Error('empty snapshot'); console.log('smoke ok:', g.nodes.length, 'nodes')"

      # The steps above only prove the BUILD pipeline works. serve/view/panel/mcp are
      # what users actually run — boot each one for real and hit a real endpoint,
      # instead of trusting that a successful `pnpm build` means they still work.
      - name: booboo serve/view/panel smoke (boot each + hit a real endpoint)
        run: |
          set -e
          wait_http() {
            for i in $(seq 1 30); do
              curl -sf "$1" >/dev/null 2>&1 && return 0
              sleep 0.5
            done
            echo "timed out waiting for $1" >&2
            return 1
          }

          node packages/cli/dist/cli.js serve --snapshot /tmp/smoke/brain.json --port 8787 &
          SERVE_PID=$!
          wait_http http://localhost:8787/graph
          curl -sf http://localhost:8787/graph | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); if(!d.counts?.nodes) throw new Error('serve /graph: missing counts.nodes'); console.log('serve smoke ok:', JSON.stringify(d.counts))"
          kill $SERVE_PID

          node packages/cli/dist/cli.js view --snapshot /tmp/smoke/brain.json --port 8989 --no-open &
          VIEW_PID=$!
          wait_http http://localhost:8989/snapshot.json
          echo "view smoke ok: /snapshot.json is live"
          kill $VIEW_PID

          node packages/cli/dist/cli.js panel --org examples/org.example.json --snapshot /tmp/smoke/brain.json --port 8990 --no-open &
          PANEL_PID=$!
          wait_http http://localhost:8990/api/org
          curl -sf http://localhost:8990/api/org | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); if(!Array.isArray(d.agents)) throw new Error('panel /api/org: missing agents[]'); console.log('panel smoke ok:', d.agents.length, 'agents')"
          kill $PANEL_PID

      # A PR that changes a published package MUST carry a changeset. This is the
      # hole that let the OS drift two weeks stale (C30) and shipped panel 0.5.2
      # to every `npx booboo` user (C35): the code was on main and correct, and
      # nothing anywhere forced the bump that would put it on npm.
      # PR-only: a direct push to main has no base to diff against, and the
      # release workflow handles main.
      - name: package change requires a changeset (GAPS C35)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          # only source that actually ships — docs/tests do not need a release
          PKG=$(echo "$CHANGED" | grep -E '^packages/[^/]+/(src|app|templates)/' || true)
          CS=$(echo "$CHANGED" | grep -E '^\.changeset/.+\.md$' || true)
          if [ -n "$PKG" ] && [ -z "$CS" ]; then
            echo "::error::These package files change but no changeset was added:"
            echo "$PKG" | sed 's/^/  /'
            echo ""
            echo "Run: pnpm changeset   (then commit the generated .changeset/*.md)"
            echo "Without one the change lands on main and NEVER reaches npm —"
            echo "that is GAPS C30 and C35, both found in production."
            exit 1
          fi
          echo "changeset check ok"

      - name: vendored index agrees with @booboo-brain/serve (GAPS C33)
        run: node scripts/check-vendored-index.mjs

      - name: booboo mcp smoke (boot + initialize handshake over stdio)
        run: node scripts/ci-mcp-smoke.mjs /tmp/smoke/brain.json
