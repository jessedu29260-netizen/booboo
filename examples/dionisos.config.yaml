# Live example: build a Booboo graph from the real Dionisos Supabase.
#   DATABASE_URL=postgres://USER:PASS@HOST:PORT/postgres  booboo build --config examples/dionisos.config.yaml
# (the password's special chars must be URL-encoded). Aegis/personal memory is walled out.
#
# TLS: this Supabase connection presents a self-signed chain, so prefix the build with
#   BOOBOO_PG_INSECURE_TLS=1 (encryption stays on; only the identity check is skipped).
#
# Verified 2026-07-13: 8,675 nodes across 8 tiers build clean, walls applied, live
# write-back (remember/report) works against the result. The `links` block below wires
# the real Cortex graph from dionisos_edges (960 edges): 851 resolve, 109 drop as
# dangling (the host:/svc:/repo:/dom:/content:/cron: tail — no node source yet; add those
# tables to wire them too). KEY GOTCHA found the hard way: the edges reference canonicals
# by their `id` column, so the cortex source below MUST use `id: id` (not `id: key`) or
# every canon: edge dangles.
# REMAINING ORPHANS (~7.9k): the engram (memory) + argus (decision) tiers. In Dionisos
# these connect to a project by CLUSTER (grouping), not by graph edges, and their bodies
# carry no [[wikilinks]] — so they are orphans by Booboo's strict metric (a non-spine
# link). Wiring them is a DATA question (add a memory→entity edge source, or author
# wikilinks in the notes), not a config tweak — deliberately left for a focused pass.

title: "Dionisos · via Booboo"
root: { id: dionisos, type: core, label: DIONISOS, layer: dionisos }

# Layer order = the system's tiering, apex doctrine → deep memory.
# GOLD CONTRACT ▷ DIONISOS ▷ PROJECT ▷ SILVER CONTRACT ▷ AGENTS ▷ ENGRAM ▷ CORTEX ▷ ARGUS
layers:
  - { name: gold,     color: "#d4af37", label: "GOLD CONTRACT" }
  - { name: dionisos, color: "#e8e2d0", label: "DIONISOS" }
  - { name: project,  color: "#4a90d9", label: "PROJECTS" }
  - { name: silver,   color: "#c7ccd1", label: "SILVER CONTRACT" }
  - { name: agents,   color: "#c9a04a", label: "AGENTS" }
  - { name: engram,   color: "#a78bd0", label: "ENGRAM" }
  - { name: cortex,   color: "#5d8a6e", label: "CORTEX" }
  - { name: argus,    color: "#cf6a5a", label: "ARGUS" }

walls: [aegis, personal]

sources:
  - adapter: postgres
    url: ${DATABASE_URL}
    nodes:
      # GOLD — apex doctrine
      - { table: public.dionisos_canonicals, type: contract, layer: gold, id: key, label: label, parent: dionisos, weight: 0.95, prefix: "gold:", where: "role = 'contract:gold'" }
      # PROJECT — all brands (not just active): dionisos_edges reference projects by
      #   slug across the portfolio, so ingest them all or their edges dangle.
      - { table: public.dionisos_projects, type: project, layer: project, id: slug, label: slug, parent: dionisos, weight: 0.7, cluster: slug, prefix: "proj:" }
      # SILVER — one overlay per cron-family (contract:cron_silver:<family>, carrying its
      #   mandate + cadence) + the 11 families. NO master node — the silver tier IS the
      #   per-family set (matches the OS Atlas).
      - { table: public.cron_families, type: contract, layer: silver, id: family_slug, label: display_name, parent: dionisos, weight: 0.4, prefix: "silver:", data: [silver_mandate, silver_cadence_hours] }
      - { table: public.cron_families, type: family, layer: silver, id: family_slug, label: display_name, parent: dionisos, weight: 0.5, icon: emoji, color: accent_hex, prefix: "fam:" }
      # AGENTS — the working agents
      - { table: public.booboo_agents, type: agent, layer: agents, id: agent_slug, label: display_name, parent: dionisos, weight: 0.6, icon: emoji, color: accent_hex, cluster: project_slug, prefix: "agent:", data: [phase, status_pill, p0_count, last_move, next_plan, prompt] }
      # ENGRAM — memory
      - { table: public.dionisos_brain_memory, type: memory, layer: engram, id: id, label: title, cluster: project, prefix: "mem:" }
      # CORTEX — canonical wiring. id: id (NOT key) — dionisos_edges reference canonicals
      #   by their id column, so the node id must be canon:<id> for the edges to resolve.
      #   No is_primary/contract filter here: the edges span the full canonical set, so the
      #   node set must too, or their edges dangle (measured: filtering drops ~761 edges).
      - { table: public.dionisos_canonicals, type: canonical, layer: cortex, id: id, label: label, cluster: role, parent: dionisos, prefix: "canon:" }
      # ARGUS — recent decisions / history
      - { table: public.dionisos_cross_decisions, type: decision, layer: argus, id: id, label: title, cluster: project, prefix: "dec:", where: "created_at > now() - interval '14 days'" }

    # CORTEX wiring — the real edges between nodes (produces/feeds/depends_on/…).
    # Endpoints already carry their prefix (canon:/proj:/…), matching the node ids
    # above; endpoints with no ingested node are dropped as dangling (see header).
    links:
      - { table: public.dionisos_edges, source: src, target: dst, type: rel }

output:
  snapshot: ./dionisos.booboo.json
